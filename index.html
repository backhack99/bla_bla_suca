<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BANANA Firmware Installer</title>

<script
  type="module"
  src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js">
</script>

<style>
:root{
    --bg:#4d4d4d;
    --card:#252525;
    --border:#3a3a3a;
    --text:#ffffff;
    --muted:#b0b0b0;
    --accent:#f2b800;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;

    background:var(--bg);

    color:var(--text);
    font-family:Segoe UI, Arial, sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}

.container{
    width:100%;
    max-width:700px;
}

.card{
    background:#222222;

    border:1px solid #333333;

    border-radius:24px;

    padding:60px 50px;

    text-align:center;

    box-shadow:
        0 25px 60px rgba(0,0,0,.45);
}

.logo{
    width:320px;
    max-width:90%;
    height:auto;

    display:block;

    margin:0 auto 15px auto;
}

h1{
    margin:0;
    font-size:36px;
    font-weight:700;
}

.subtitle{
    margin-top:12px;

    color:var(--muted);

    line-height:1.6;
    font-size:16px;
}

.version{
    margin-top:25px;

    color:#d0d0d0;
    font-size:14px;
}

.install{
    margin-top:35px;
}

esp-web-install-button{
    --esp-tools-button-color: var(--accent);
    --esp-tools-button-text-color: white;
    --esp-tools-button-border-radius: 12px;
}

.info{
    margin-top:40px;

    display:grid;
    grid-template-columns:repeat(2,1fr);

    gap:15px;
}

.info-box{
    border:1px solid var(--border);
    border-radius:12px;

    padding:18px;
}

.info-title{
    font-size:13px;
    color:var(--muted);
}

.info-value{
    margin-top:8px;
    font-weight:600;
}

.changelog{
    margin-top:35px;

    text-align:left;

    border-top:1px solid var(--border);

    padding-top:25px;
}

.changelog h3{
    margin-top:0;
}

.changelog ul{
    color:var(--muted);
    line-height:1.8;
    padding-left:20px;
}

.footer{
    margin-top:25px;

    color:var(--muted);
    font-size:13px;
}

@media(max-width:700px){

    .card{
        padding:30px;
    }

    .info{
        grid-template-columns:1fr;
    }

    h1{
        font-size:28px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="card">

        <!-- Sostituisci logo.png con il nome del tuo file -->
        <img src="logo banana.png" alt="BANANA Logo" class="logo">

        <p class="subtitle">
            Installa o aggiorna il firmware del tuo dispositivo
            direttamente dal browser tramite USB.
        </p>

        <div class="version">
            Firmware v1.0.1
        </div>

        <div class="install">
            <esp-web-install-button manifest="manifest.json">
            </esp-web-install-button>
        </div>

        <div class="info">

            <div class="info-box">
                <div class="info-title">Connessione</div>
                <div class="info-value">USB WebSerial</div>
            </div>

            <div class="info-box">
                <div class="info-title">Compatibilità</div>
                <div class="info-value">Chrome / Edge</div>
            </div>

        </div>

        <div class="changelog">

            <h3>Novità</h3>

            <ul>
                <li>Ottimizzazione memoria</li>
                <li>Correzioni bug generali</li>
            </ul>

        </div>

        <div class="footer">
            © 2026 Ubundu Consulting · BANANA
        </div>

    </div>

</div>

</body>
</html>
